<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Student Dashboard | VU AI Interview System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .navbar {
      background: linear-gradient(135deg, #003366 0%, #001a3d 100%);
      backdrop-filter: blur(10px);
      padding: 16px 32px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      position: sticky; top: 0; z-index: 100;
    }

    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #ffcc00, #ffaa00);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,.2);
    }
    .logo-icon i { font-size: 1.8rem; color: #003366; }

    .logo-text h1 { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .logo-text p  { font-size: .7rem; color: #ffdd99; }

    .user-info {
      display: flex; align-items: center; gap: 20px;
      background: rgba(255,255,255,.12); padding: 6px 20px 6px 12px;
      border-radius: 60px; backdrop-filter: blur(10px);
    }

    .user-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, #ffcc00, #ffaa00);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.3rem; color: #003366;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      cursor: pointer; text-decoration: none;
    }

    .user-details h4 { color: white; font-size: .95rem; font-weight: 600; }
    .user-details p  { color: #ffdd99; font-size: .7rem; }

    .logout-btn {
      background: rgba(255,68,68,.2);
      border: 1px solid rgba(255,100,100,.4);
      padding: 8px 18px; border-radius: 40px; color: white; cursor: pointer;
      transition: all .3s; font-weight: 500; display: flex; align-items: center; gap: 8px; font-size: .85rem;
    }
    .logout-btn:hover { background: #ff4444; border-color: #ff4444; transform: translateY(-2px); }

    .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 30px; }

    .welcome-section {
      background: linear-gradient(115deg, #ffffff, #fefefe);
      border-radius: 32px; padding: 32px 36px; margin-bottom: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,.05);
      border: 1px solid rgba(0,51,102,.08);
      position: relative; overflow: hidden;
    }
    .welcome-section::before {
      content: ''; position: absolute; top: 0; right: 0; width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255,204,0,.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .welcome-section h2 { font-size: 1.8rem; color: #003366; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .welcome-section p  { color: #5a6e8c; font-size: .95rem; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px; margin-bottom: 32px;
    }
    .stat-card {
      background: white; border-radius: 28px; padding: 24px;
      display: flex; align-items: center; gap: 18px;
      box-shadow: 0 5px 15px rgba(0,0,0,.05);
      transition: all .3s ease; border: 1px solid rgba(0,51,102,.08); cursor: pointer;
    }
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,51,102,.1);
      border-color: rgba(0,51,102,.2);
    }

    .stat-icon {
      width: 65px; height: 65px;
      background: linear-gradient(135deg, #eef3fc, #e4ecf5);
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
    }
    .stat-icon i { font-size: 2rem; color: #003366; }
    .stat-info h3 { font-size: 2rem; font-weight: 800; color: #1e2a3e; line-height: 1.2; }
    .stat-info p  { color: #6c86a3; font-size: .85rem; font-weight: 500; margin-top: 4px; }

    .section-card {
      background: white; border-radius: 32px; padding: 28px; margin-bottom: 32px;
      box-shadow: 0 5px 15px rgba(0,0,0,.05);
      border: 1px solid rgba(0,51,102,.08);
    }

    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid #eef2f8;
      flex-wrap: wrap; gap: 10px;
    }
    .section-header h3 { font-size: 1.2rem; color: #003366; display: flex; align-items: center; gap: 10px; }
    .section-header h3 i { color: #ffcc00; }

    .filter-tabs {
      display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
    }
    .filter-tab {
      padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.3s; border: 1px solid #d0dbe8; background: white; color: #003366;
    }
    .filter-tab:hover { background: #e8f0fe; border-color: #003366; }
    .filter-tab.active { background: linear-gradient(135deg, #003366, #1a4d8c); color: white; border-color: transparent; }

    .interview-card {
      background: #f8fafd;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all .3s;
      border-left: 4px solid;
    }
    .interview-card.upcoming { border-left-color: #ff4757; }
    .interview-card:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,.1); }

    .interview-title { font-size: 1.1rem; font-weight: 700; color: #003366; margin-bottom: 8px; }
    .interview-details { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 12px; font-size: .85rem; color: #6c86a3; }
    .interview-details i { width: 20px; color: #ffcc00; }

    .badge-upcoming { background: #ff4757; color: white; padding: 4px 12px; border-radius: 20px; font-size: .7rem; font-weight: 600; }

    .join-btn {
      background: linear-gradient(135deg, #003366, #1a4d8c);
      color: #fff; padding: 8px 20px; border-radius: 40px;
      text-decoration: none; font-size: .85rem; font-weight: 600;
      transition: all .3s; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    }
    .join-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,51,102,.3); }

    .empty-state { text-align: center; padding: 60px 20px; color: #8ba0bc; }
    .empty-state i { font-size: 4rem; margin-bottom: 16px; color: #c0d0e8; }

    .analytics-section {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 24px; margin-bottom: 32px;
    }

    .analytics-card {
      background: white; border-radius: 32px; padding: 28px;
      box-shadow: 0 5px 15px rgba(0,0,0,.05);
      border: 1px solid rgba(0,51,102,.08);
      transition: transform .2s;
    }
    .analytics-card:hover { transform: translateY(-3px); }

    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid #eef2f8;
    }
    .card-header h3 { font-size: 1.2rem; color: #003366; display: flex; align-items: center; gap: 10px; }
    .card-header h3 i { color: #ffcc00; }

    .progress-item { margin-bottom: 24px; }
    .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: .85rem; font-weight: 600; color: #2c3e50; }
    .progress-bar-bg { background: #e8edf4; border-radius: 12px; height: 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 12px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }
    .fill-blue { background: linear-gradient(90deg, #003366, #1a4d8c); }
    .fill-green { background: linear-gradient(90deg, #2c5a2e, #1e7b48); }
    .fill-gold { background: linear-gradient(90deg, #ffcc00, #ffaa00); }
    .fill-purple { background: linear-gradient(90deg, #6a4e9b, #8b6fc6); }

    .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .metric-item {
      background: linear-gradient(135deg, #fafcff, #f5f8fe);
      padding: 20px; border-radius: 24px; text-align: center;
      transition: all .2s; border: 1px solid rgba(0,51,102,.05);
    }
    .metric-item:hover { transform: scale(1.02); background: #fff; }
    .metric-value { font-size: 2rem; font-weight: 800; color: #003366; }
    .metric-label { font-size: .75rem; color: #6c86a3; margin-top: 6px; }

    .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px; margin-bottom: 32px; }
    .chart-card { background: white; border-radius: 32px; padding: 22px; box-shadow: 0 5px 15px rgba(0,0,0,.05); border: 1px solid rgba(0,51,102,.08); }
    .chart-wrap { position: relative; height: 280px; }

    .track-record {
      background: white; border-radius: 32px; padding: 28px; margin-bottom: 32px;
      box-shadow: 0 5px 15px rgba(0,0,0,.05);
      border: 1px solid rgba(0,51,102,.08);
    }

    .track-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .track-header h3 { font-size: 1.2rem; color: #003366; display: flex; align-items: center; gap: 10px; }

    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 16px 14px; text-align: left; border-bottom: 1px solid #eef2f8; }
    th { color: #003366; font-weight: 700; font-size: .85rem; background: #f8fafd; text-transform: uppercase; }
    td { color: #2c3e50; font-size: .88rem; }

    .status-badge { padding: 5px 14px; border-radius: 30px; font-size: .7rem; font-weight: 700; display: inline-block; }
    .status-completed { background: #e3f7ec; color: #1e7b48; }

    .score-high { color: #2ed573; font-weight: 700; }
    .score-medium { color: #ffa502; font-weight: 700; }
    .score-low { color: #ff4757; font-weight: 700; }

    .interview-action { text-align: center; margin: 20px 0 30px; }
    .start-interview-btn {
      background: linear-gradient(135deg, #003366, #1a4d8c);
      border: none; padding: 18px 56px; border-radius: 80px;
      font-size: 1.2rem; font-weight: 700; color: white;
      cursor: pointer; transition: all .3s ease;
      display: inline-flex; align-items: center; gap: 14px;
      box-shadow: 0 12px 28px rgba(0,51,102,.35);
    }
    .start-interview-btn:hover { transform: translateY(-4px); box-shadow: 0 20px 35px rgba(0,51,102,.45); }

    .skeleton-loader {
      animation: skeleton-loading 1.2s ease-in-out infinite;
      background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      border-radius: 8px;
    }
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-welcome { height: 120px; border-radius: 32px; margin-bottom: 32px; }
    .skeleton-stat-card { height: 120px; border-radius: 28px; }
    .skeleton-analytics-card { height: 380px; border-radius: 32px; }
    .skeleton-table { height: 400px; border-radius: 32px; }

    @media (max-width: 768px) {
      .navbar { flex-direction: column; text-align: center; padding: 16px 20px; }
      .dashboard-container { padding: 20px; }
      .welcome-section { padding: 24px; }
      .welcome-section h2 { font-size: 1.3rem; }
      .stat-info h3 { font-size: 1.5rem; }
      .metric-grid { grid-template-columns: 1fr; }
      .chart-grid { grid-template-columns: 1fr; }
      .filter-tabs { justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
      <div class="logo-text">
        <h1>Vidyasagar University</h1>
        <p>AI-Powered Interview System</p>
      </div>
    </div>

    <div class="user-info" id="userInfo">
      <a href="student-profile.html" style="text-decoration:none;">
        <div class="user-avatar" id="userAvatar">👤</div>
      </a>
      <div class="user-details">
        <h4 id="studentName">Loading...</h4>
        <p id="studentReg">Registration: ---</p>
        <p id="studentDept" style="font-size:0.65rem;color:#ffdd99;">Department: ---</p>
      </div>
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </div>

  <div class="dashboard-container" id="dashboardContent">
    <div id="skeletonLoader">
      <div class="skeleton-loader skeleton-welcome"></div>
      <div class="stats-grid">
        <div class="skeleton-loader skeleton-stat-card"></div>
        <div class="skeleton-loader skeleton-stat-card"></div>
        <div class="skeleton-loader skeleton-stat-card"></div>
        <div class="skeleton-loader skeleton-stat-card"></div>
      </div>
      <div class="analytics-section">
        <div class="skeleton-loader skeleton-analytics-card"></div>
        <div class="skeleton-loader skeleton-analytics-card"></div>
      </div>
      <div class="skeleton-loader skeleton-table"></div>
    </div>
  </div>

  <script>
    // Supabase Configuration
    const SB_URL = 'https://mfivynrqcibkpiqkgjqt.supabase.co';
    const SB_KEY = 'sb_publishable_DAk1iF9K-968ldj4BQW3tw_IxTC5eWV';
    const { createClient } = supabase;
    const _supabase = createClient(SB_URL, SB_KEY);

    if (sessionStorage.getItem('isLoggedIn') !== 'true') {
      window.location.href = 'login.html';
    }

    let currentStudent = null;
    let upcomingInterviews = [];
    let interviewHistory = [];
    let currentFilter = 'all'; // all, company, departmental, placement, other

    let scoreTrendChart = null;
    let skillRadarChart = null;

    function escapeHtml(text = '') {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString('en-IN', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    }

    // Fetch upcoming interviews from scheduled_interviews table
    async function fetchUpcomingInterviews(regNo) {
      try {
        const { data, error } = await _supabase
          .from('scheduled_interviews')
          .select('*')
          .eq('student_registration_no', regNo)
          .eq('status', 'Scheduled')
          .gte('scheduled_date', new Date().toISOString().split('T')[0])
          .order('scheduled_date', { ascending: true });

        if (error) {
          console.error('Error fetching upcoming interviews:', error);
          return [];
        }
        return data || [];
      } catch (err) {
        console.error('Exception:', err);
        return [];
      }
    }

    // Fetch practice interview history
    async function fetchInterviewHistory(regNo) {
      try {
        const { data, error } = await _supabase
          .from('interview_history')
          .select('*')
          .eq('student_registration_no', regNo)
          .order('interview_date', { ascending: false });

        if (error) return [];
        return data || [];
      } catch (err) {
        return [];
      }
    }

    // Calculate analytics from interview history
    function calculateAnalytics(history) {
      if (!history || history.length === 0) {
        return {
          total: 0, avgScore: 0, excellentCount: 0, highestScore: 0,
          technicalScore: 75, communicationScore: 72, problemSolvingScore: 70, confidenceScore: 68,
          improvementTrend: 0, avgAccuracy: 0
        };
      }
      const total = history.length;
      const avgScore = Math.round(history.reduce((s, i) => s + (i.score || 0), 0) / total);
      const excellentCount = history.filter(i => (i.score || 0) >= 85).length;
      const highestScore = Math.max(...history.map(i => i.score || 0));
      
      // Calculate improvement trend
      let improvementTrend = 0;
      const sorted = [...history].sort((a,b) => new Date(a.interview_date) - new Date(b.interview_date));
      if (sorted.length >= 2) {
        const firstHalf = sorted.slice(0, Math.floor(sorted.length/2));
        const secondHalf = sorted.slice(Math.floor(sorted.length/2));
        const firstAvg = firstHalf.reduce((s,i) => s + (i.score||0),0) / firstHalf.length;
        const secondAvg = secondHalf.reduce((s,i) => s + (i.score||0),0) / secondHalf.length;
        improvementTrend = Math.round(secondAvg - firstAvg);
      }
      
      // Calculate skill scores from answers if available
      let techSum = 0, commSum = 0, probSum = 0, confSum = 0, accSum = 0, count = 0;
      history.forEach(h => {
        if (h.answers && Array.isArray(h.answers)) {
          h.answers.forEach(a => {
            techSum += a.technical_score || a.accuracy || 70;
            commSum += a.communication_score || a.accuracy || 70;
            probSum += a.problem_solving_score || a.accuracy || 70;
            confSum += a.confidence_score || 70;
            accSum += a.accuracy || 70;
            count++;
          });
        }
      });
      
      return {
        total, avgScore, excellentCount, highestScore, improvementTrend,
        technicalScore: count ? Math.round(techSum / count) : 78,
        communicationScore: count ? Math.round(commSum / count) : 75,
        problemSolvingScore: count ? Math.round(probSum / count) : 80,
        confidenceScore: count ? Math.round(confSum / count) : 72,
        avgAccuracy: count ? Math.round(accSum / count) : 75
      };
    }

    // Render upcoming interviews with category filters
    function renderUpcomingSection() {
      // Count by category
      const counts = {
        all: upcomingInterviews.length,
        company: upcomingInterviews.filter(i => i.interview_category === 'Company').length,
        departmental: upcomingInterviews.filter(i => i.interview_category === 'Departmental').length,
        placement: upcomingInterviews.filter(i => i.interview_category === 'Placement').length,
        other: upcomingInterviews.filter(i => !i.interview_category || i.interview_category === 'Other').length
      };

      let filtered = upcomingInterviews;
      if (currentFilter === 'company') filtered = upcomingInterviews.filter(i => i.interview_category === 'Company');
      else if (currentFilter === 'departmental') filtered = upcomingInterviews.filter(i => i.interview_category === 'Departmental');
      else if (currentFilter === 'placement') filtered = upcomingInterviews.filter(i => i.interview_category === 'Placement');
      else if (currentFilter === 'other') filtered = upcomingInterviews.filter(i => !i.interview_category || i.interview_category === 'Other');

      const filterTabs = `
        <div class="filter-tabs">
          <button class="filter-tab ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">📋 All (${counts.all})</button>
          <button class="filter-tab ${currentFilter === 'company' ? 'active' : ''}" onclick="setFilter('company')">🏢 Company (${counts.company})</button>
          <button class="filter-tab ${currentFilter === 'departmental' ? 'active' : ''}" onclick="setFilter('departmental')">📚 Departmental (${counts.departmental})</button>
          <button class="filter-tab ${currentFilter === 'placement' ? 'active' : ''}" onclick="setFilter('placement')">🎯 Placement (${counts.placement})</button>
          <button class="filter-tab ${currentFilter === 'other' ? 'active' : ''}" onclick="setFilter('other')">📌 Other (${counts.other})</button>
        </div>
      `;

      if (filtered.length === 0) {
        return `
          <div class="section-card">
            <div class="section-header">
              <h3><i class="fas fa-calendar-alt"></i> 🎯 Upcoming Interviews</h3>
              <span class="badge-upcoming">${counts.all} Scheduled</span>
            </div>
            ${filterTabs}
            <div class="empty-state">
              <i class="fas fa-calendar-check"></i>
              <p>No upcoming interviews in this category</p>
            </div>
          </div>
        `;
      }

      const interviewsHtml = filtered.map(interview => `
        <div class="interview-card upcoming">
          <div class="interview-title">
            <i class="fas ${interview.interview_category === 'Company' ? 'fa-building' : interview.interview_category === 'Departmental' ? 'fa-university' : 'fa-briefcase'}"></i>
            ${escapeHtml(interview.company_name || interview.interview_title)} - ${escapeHtml(interview.interview_title)}
          </div>
          <div class="interview-details">
            <span><i class="fas fa-tag"></i> ${escapeHtml(interview.interview_type || 'Technical')}</span>
            <span><i class="fas fa-calendar-day"></i> ${formatDate(interview.scheduled_date)}</span>
            <span><i class="fas fa-clock"></i> ${interview.scheduled_time?.slice(0,5) || 'TBD'}</span>
            <span><i class="fas fa-hourglass-half"></i> ${interview.duration_minutes || 45} mins</span>
            <span><i class="fas fa-user-tie"></i> ${escapeHtml(interview.interviewer_name || 'TBD')}</span>
          </div>
          <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;">
            <button class="join-btn" onclick="joinInterview('${interview.id}')">
              <i class="fas fa-video"></i> Join Interview
            </button>
            ${interview.meeting_link ? `<a href="${escapeHtml(interview.meeting_link)}" target="_blank" class="join-btn" style="background:#28a745;"><i class="fas fa-external-link-alt"></i> Meeting Link</a>` : ''}
          </div>
        </div>
      `).join('');

      return `
        <div class="section-card">
          <div class="section-header">
            <h3><i class="fas fa-calendar-alt"></i> 🎯 Upcoming Interviews (Evaluation)</h3>
            <span class="badge-upcoming">${counts.all} Scheduled</span>
          </div>
          ${filterTabs}
          ${interviewsHtml}
        </div>
      `;
    }

    function setFilter(filter) {
      currentFilter = filter;
      renderDashboard();
    }

    function joinInterview(interviewId) {
      const interview = upcomingInterviews.find(i => i.id == interviewId);
      if (interview?.meeting_link) {
        window.open(interview.meeting_link, '_blank');
      } else {
        alert('Meeting link will be available soon.');
      }
    }

    function renderCharts(analytics) {
      // Score trend from history
      const completed = interviewHistory.filter(h => h.status === 'Completed').sort((a,b) => new Date(a.interview_date) - new Date(b.interview_date));
      const trendCanvas = document.getElementById('scoreTrendChart');
      const radarCanvas = document.getElementById('skillRadarChart');
      
      if (scoreTrendChart) scoreTrendChart.destroy();
      if (skillRadarChart) skillRadarChart.destroy();
      
      if (trendCanvas) {
        scoreTrendChart = new Chart(trendCanvas, {
          type: 'line',
          data: {
            labels: completed.map(h => formatDate(h.interview_date)),
            datasets: [{
              label: 'Interview Score %',
              data: completed.map(h => h.score || 0),
              borderColor: '#003366',
              backgroundColor: 'rgba(0,51,102,0.1)',
              fill: true,
              tension: 0.3
            }]
          },
          options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
        });
      }
      
      if (radarCanvas) {
        skillRadarChart = new Chart(radarCanvas, {
          type: 'radar',
          data: {
            labels: ['Technical', 'Communication', 'Problem Solving', 'Confidence', 'Accuracy'],
            datasets: [{
              label: 'Your Skills',
              data: [analytics.technicalScore, analytics.communicationScore, analytics.problemSolvingScore, analytics.confidenceScore, analytics.avgAccuracy],
              borderColor: '#003366',
              backgroundColor: 'rgba(0,51,102,0.2)'
            }]
          },
          options: { responsive: true, maintainAspectRatio: false, scales: { r: { beginAtZero: true, max: 100 } } }
        });
      }
    }

    async function renderDashboard() {
      const analytics = calculateAnalytics(interviewHistory);
      const totalStudents = 156;
      const rank = Math.max(1, Math.min(120, Math.floor((100 - analytics.avgScore) * 1.2) + 5));
      
      const tableRows = interviewHistory.length > 0 ? 
        interviewHistory.map(interview => {
          let scoreClass = (interview.score || 0) >= 85 ? 'score-high' : (interview.score || 0) >= 70 ? 'score-medium' : 'score-low';
          return `
            <tr>
              <td>${formatDate(interview.interview_date)}</td>
              <td><strong>${escapeHtml(interview.topic || 'Mock Interview')}</strong><br><small>${escapeHtml(interview.interview_type || 'Practice')}</small></td>
              <td><span class="${scoreClass}">${interview.score || 0}%</span></td>
              <td><span class="status-badge status-completed">${interview.status || 'Completed'}</span></td>
              <td>${escapeHtml(interview.feedback ? interview.feedback.substring(0,80) + (interview.feedback.length>80?'...':'') : 'No feedback')}</td>
            </tr>
          `;
        }).join('') : 
        `<tr><td colspan="5" style="text-align:center;padding:40px;"><div class="empty-state"><i class="fas fa-microphone-slash"></i><p>No interviews taken yet. Start your first mock interview!</p></div></td></tr>`;

      const upcomingHtml = renderUpcomingSection();

      const dashboardHTML = `
        <div class="welcome-section">
          <h2><i class="fas fa-hand-wave" style="color:#ffcc00;"></i> Welcome back, ${escapeHtml(currentStudent?.full_name || 'Student')}!</h2>
          <p><i class="fas fa-chart-line"></i> Your AI interview journey at a glance. Track your progress and upcoming interviews.</p>
        </div>

        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-check"></i></div><div class="stat-info"><h3>${currentStudent?.attendance_percentage || 94}%</h3><p>Attendance</p></div></div>
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-info"><h3>${analytics.avgScore}%</h3><p>Avg Interview Score</p></div></div>
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-trophy"></i></div><div class="stat-info"><h3>#${rank}</h3><p>Class Rank (out of ${totalStudents})</p></div></div>
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-microphone-alt"></i></div><div class="stat-info"><h3>${analytics.total}</h3><p>Interviews Taken</p></div></div>
        </div>

        ${upcomingHtml}

        <div class="analytics-section">
          <div class="analytics-card">
            <div class="card-header"><h3><i class="fas fa-chart-simple"></i> Performance Analytics</h3></div>
            <div class="progress-item"><div class="progress-label"><span>Technical Skills</span><span>${analytics.technicalScore}%</span></div><div class="progress-bar-bg"><div class="progress-fill fill-blue" style="width:${analytics.technicalScore}%"></div></div></div>
            <div class="progress-item"><div class="progress-label"><span>Communication</span><span>${analytics.communicationScore}%</span></div><div class="progress-bar-bg"><div class="progress-fill fill-green" style="width:${analytics.communicationScore}%"></div></div></div>
            <div class="progress-item"><div class="progress-label"><span>Problem Solving</span><span>${analytics.problemSolvingScore}%</span></div><div class="progress-bar-bg"><div class="progress-fill fill-gold" style="width:${analytics.problemSolvingScore}%"></div></div></div>
            <div class="progress-item"><div class="progress-label"><span>Confidence</span><span>${analytics.confidenceScore}%</span></div><div class="progress-bar-bg"><div class="progress-fill fill-purple" style="width:${analytics.confidenceScore}%"></div></div></div>
          </div>
          <div class="analytics-card">
            <div class="card-header"><h3><i class="fas fa-chart-pie"></i> Key Metrics</h3></div>
            <div class="metric-grid">
              <div class="metric-item"><div class="metric-value">${analytics.excellentCount}</div><div class="metric-label">Excellent (85%+)</div></div>
              <div class="metric-item"><div class="metric-value">${analytics.highestScore}%</div><div class="metric-label">Highest Score</div></div>
              <div class="metric-item"><div class="metric-value">${analytics.improvementTrend > 0 ? '+' : ''}${analytics.improvementTrend}</div><div class="metric-label">Improvement</div></div>
              <div class="metric-item"><div class="metric-value">${currentStudent?.department || 'CSE'}</div><div class="metric-label">Department</div></div>
              <div class="metric-item"><div class="metric-value">${currentStudent?.semester || '6th'}</div><div class="metric-label">Semester</div></div>
              <div class="metric-item"><div class="metric-value">${analytics.avgAccuracy}%</div><div class="metric-label">Avg Accuracy</div></div>
            </div>
          </div>
        </div>

        <div class="chart-grid">
          <div class="chart-card"><div class="section-header"><h3><i class="fas fa-chart-line"></i> Score Trend</h3></div><div class="chart-wrap"><canvas id="scoreTrendChart"></canvas></div></div>
          <div class="chart-card"><div class="section-header"><h3><i class="fas fa-bullseye"></i> Skill Radar</h3></div><div class="chart-wrap"><canvas id="skillRadarChart"></canvas></div></div>
        </div>

        <div class="track-record">
          <div class="track-header"><h3><i class="fas fa-history"></i> Practice Interview History</h3></div>
          <div class="table-container">
            <table><thead><tr><th>Date</th><th>Topic / Type</th><th>Score</th><th>Status</th><th>Feedback</th></tr></thead><tbody>${tableRows}</tbody></table>
          </div>
        </div>

        <div class="interview-action">
          <button class="start-interview-btn" onclick="startMockInterview()">
            <i class="fas fa-microphone-alt"></i> Start Mock Interview with InterVU AI <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      `;

      document.getElementById('dashboardContent').innerHTML = dashboardHTML;
      renderCharts(analytics);
    }

    async function loadStudentData() {
      const regNo = sessionStorage.getItem('regNo');
      if (!regNo) { window.location.href = 'login.html'; return; }

      try {
        const { data, error } = await _supabase.from('student').select('*').eq('registration_no', regNo).single();
        if (error || !data) throw new Error('Student data not found');
        currentStudent = data;
        
        document.getElementById('studentName').textContent = data.full_name;
        document.getElementById('studentReg').textContent = `Reg: ${data.registration_no}`;
        document.getElementById('studentDept').textContent = `Dept: ${data.department || 'Computer Science'}`;
        document.getElementById('userAvatar').textContent = (data.full_name || 'S').charAt(0).toUpperCase();
        
        upcomingInterviews = await fetchUpcomingInterviews(regNo);
        interviewHistory = await fetchInterviewHistory(regNo);
        
        await renderDashboard();
      } catch (err) {
        console.error(err);
        document.getElementById('dashboardContent').innerHTML = '<div class="welcome-section"><h2>Error loading data</h2><p>Please refresh or contact support.</p></div>';
      }
    }

    function startMockInterview() { window.location.href = 'interview-home.html'; }
    function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

    document.addEventListener('DOMContentLoaded', loadStudentData);
  </script>
</body>
</html>
